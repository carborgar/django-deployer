<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Django Deployer{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    .status-running { @apply bg-yellow-500; }
    .status-success { @apply bg-green-500; }
    .status-failed  { @apply bg-red-500; }
    .status-pending { @apply bg-gray-500; }
    .log-area { font-family: 'Fira Mono', 'Consolas', monospace; }
  </style>
</head>
<body class="h-full text-gray-100">

<!-- Navbar -->
<nav class="bg-gray-900 border-b border-gray-700 px-6 py-3 flex items-center gap-4">
  <a href="/" class="text-indigo-400 font-bold text-lg tracking-tight">⚡ Django Deployer</a>
  <span class="flex-1"></span>
  <a href="/apps/new" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm px-4 py-1.5 rounded-md transition">
    + Nueva app
  </a>
</nav>

<div class="flex h-[calc(100vh-52px)]">
  <!-- Sidebar -->
  <aside class="w-56 bg-gray-900 border-r border-gray-700 p-4 overflow-y-auto hidden md:block">
    <p class="text-xs text-gray-500 uppercase tracking-wider mb-3">Apps</p>
    <div id="sidebar-apps">
      {% block sidebar %}{% endblock %}
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto p-6">
    {% block content %}{% endblock %}
  </main>
</div>

</body>
</html>
